<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>Primecare Chiropractic - MVA Intake</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Primecare Intake">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --teal:#4d7f85;
    --teal-dark:#3a6167;
    --teal-light:#e8f1f2;
    --ink:#233238;
    --border:#d7e0e2;
    --danger:#b0413e;
    --bg:#f4f7f8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-tap-highlight-color:transparent;
  }
  /* language overlay */
  #langOverlay{
    position:fixed;inset:0;background:var(--teal-light);z-index:9999;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .lang-card{background:#fff;border-radius:20px;padding:36px 30px;max-width:380px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.14);}
  .lang-card h2{color:var(--teal-dark);margin:8px 0 4px;}
  .lang-card p{color:#778;font-size:13.5px;margin:0 0 22px;}
  .lang-btn{display:block;width:100%;padding:16px;margin-bottom:12px;border:2px solid var(--border);border-radius:14px;font-size:17px;font-weight:700;background:#fff;cursor:pointer;text-align:left;padding-left:22px;}
  .lang-btn:active{background:var(--teal-light);border-color:var(--teal);color:var(--teal-dark);}

  header.top{
    background:var(--teal);color:#fff;
    padding:18px 20px calc(18px + env(safe-area-inset-top,0px));
    text-align:center;position:sticky;top:0;z-index:20;
  }
  header.top h1{margin:0;font-size:20px;font-weight:700;}
  header.top p{margin:4px 0 0;font-size:13px;opacity:.9;}
  header.top .langSwap{position:absolute;right:14px;top:calc(16px + env(safe-area-inset-top,0px));font-size:11px;background:rgba(255,255,255,.18);border:none;color:#fff;padding:5px 9px;border-radius:8px;}
  .progress-wrap{background:#fff;border-bottom:1px solid var(--border);padding:10px 20px;position:sticky;top:64px;z-index:19;}
  .progress-bar{height:6px;background:var(--teal-light);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--teal);transition:width .25s ease;}
  .progress-label{font-size:12px;color:#667;margin-top:6px;text-align:center;}
  main{max-width:640px;margin:0 auto;padding:20px 16px 150px;}
  .card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px 18px;margin-bottom:16px;}
  .step{display:none;}
  .step.active{display:block;animation:fade .2s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .step h2{font-size:18px;margin:0 0 4px;color:var(--teal-dark);}
  .step .sub{font-size:13px;color:#667;margin:0 0 18px;}
  fieldset{border:none;padding:0;margin:0 0 20px;}
  legend{font-weight:600;font-size:14.5px;margin-bottom:8px;padding:0;color:var(--ink);}
  legend .hint{display:block;font-weight:400;font-size:12.5px;color:#778;margin-top:2px;}
  label.field{display:block;margin-bottom:14px;}
  label.field span.lbl{display:block;font-size:14.5px;font-weight:600;margin-bottom:6px;}
  input[type=text],input[type=email],input[type=tel],input[type=date],input[type=time],input[type=number],textarea,select{
    width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;background:#fbfcfc;font-family:inherit;color:var(--ink);
  }
  textarea{min-height:70px;resize:vertical;}
  input:focus,textarea:focus,select:focus{outline:2px solid var(--teal);outline-offset:1px;background:#fff;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .choice-grid{display:flex;flex-wrap:wrap;gap:8px;}
  .choice{border:1.5px solid var(--border);border-radius:20px;padding:9px 15px;font-size:14px;cursor:pointer;background:#fff;user-select:none;transition:.12s;}
  .choice input{position:absolute;opacity:0;width:0;height:0;}
  .choice.selected{background:var(--teal);border-color:var(--teal);color:#fff;}
  .choice-grid.block .choice{flex:1 1 100%;text-align:center;}
  .choice-grid.two .choice{flex:1 1 calc(50% - 8px);text-align:center;}
  .conditional{border-left:3px solid var(--teal-light);padding-left:12px;margin-top:10px;display:none;}
  .conditional.show{display:block;}
  .pain-scale{display:flex;gap:5px;flex-wrap:wrap;justify-content:space-between;}
  .pain-scale .choice{flex:1 1 auto;min-width:30px;padding:9px 0;text-align:center;border-radius:8px;}
  .scale-labels{display:flex;justify-content:space-between;font-size:11.5px;color:#778;margin-top:6px;}
  nav.wizard-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:12px 16px calc(12px + env(safe-area-inset-bottom,0px));display:flex;gap:10px;z-index:20;}
  nav.wizard-nav button{flex:1;padding:14px;border-radius:12px;border:none;font-size:16px;font-weight:600;cursor:pointer;}
  #btnBack{background:#eef2f2;color:var(--ink);}
  #btnNext,#btnSubmit{background:var(--teal);color:#fff;}
  #btnNext:disabled,#btnSubmit:disabled{opacity:.5;}
  .add-btn{background:var(--teal-light);border:1.5px dashed var(--teal);color:var(--teal-dark);padding:10px 14px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:6px;}
  .remove-btn{background:none;border:none;color:var(--danger);font-size:13px;font-weight:600;cursor:pointer;padding:4px 0;}
  .ros-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #eef2f2;gap:8px;}
  .ros-row .ros-name{font-size:13.5px;flex:1;}
  .ros-row .ros-controls{display:flex;gap:6px;align-items:center;}
  .ros-row .choice{padding:6px 12px;font-size:13px;border-radius:14px;}
  .ros-row .after-check{font-size:11px;color:#778;display:flex;align-items:center;gap:4px;white-space:nowrap;}
  .ros-system-title{font-weight:700;font-size:13px;color:var(--teal-dark);text-transform:uppercase;letter-spacing:.03em;margin:16px 0 4px;}
  .review-section{margin-bottom:16px;}
  .review-section h3{font-size:14.5px;color:var(--teal-dark);margin:0 0 8px;border-bottom:1.5px solid var(--teal-light);padding-bottom:4px;}
  .review-item{display:flex;font-size:13.5px;padding:3px 0;gap:6px;}
  .review-item .k{color:#667;min-width:44%;}
  .review-item .v{font-weight:600;flex:1;}
  .consent-box{background:var(--teal-light);border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.5;margin-bottom:14px;color:#33474c;}
  .checkline{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;}
  .checkline input{margin-top:3px;width:18px;height:18px;flex:none;}
  .checkline span{font-size:14px;line-height:1.4;}
  #screenDone{display:none;}
  #screenDone.active{display:block;}
  .done-wrap{max-width:520px;margin:60px auto;text-align:center;padding:0 24px;}
  .done-wrap .icon{font-size:52px;}
  .done-wrap h2{color:var(--teal-dark);}
  .status-line{font-size:14px;color:#556;margin-top:18px;}
  .dl-links{margin-top:22px;display:flex;flex-direction:column;gap:10px;}
  .dl-links a,.dl-links button{display:block;background:var(--teal);color:#fff;text-decoration:none;padding:13px;border-radius:10px;font-weight:600;font-size:15px;border:none;cursor:pointer;}
  .dl-links .secondary{background:#eef2f2;color:var(--ink);}
  #screenIntro{max-width:560px;margin:24px auto;padding:0 16px;}
  #screenIntro .card{text-align:center;}
  #screenIntro h2{color:var(--teal-dark);}
  #screenIntro button{background:var(--teal);color:#fff;border:none;padding:15px 20px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;width:100%;margin-top:14px;}
  .error-banner{background:#fdecea;border:1px solid #f3b8b3;color:#8a2f2b;padding:10px 14px;border-radius:10px;font-size:13.5px;margin-bottom:14px;}
  #wizardWrap{display:none;}
  #wizardWrap.active{display:block;}

  /* diagram marking */
  .diagram-wrap{position:relative;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;background:#fff;touch-action:none;max-width:100%;}
  .diagram-wrap img{display:block;width:100%;height:auto;pointer-events:none;user-select:none;}
  .diagram-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none;}
  .diagram-tools{display:flex;gap:8px;margin-top:8px;}
  .diagram-tools button{flex:1;padding:9px;border-radius:9px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;}
  .diagram-tools button.primary{background:var(--teal-light);border-color:var(--teal);color:var(--teal-dark);}
  .diagram-hint{font-size:12px;color:#778;margin-top:6px;}

  /* signature pad */
  .sig-wrap{border:1.5px solid var(--border);border-radius:12px;background:#fff;position:relative;touch-action:none;}
  .sig-wrap canvas{width:100%;height:150px;display:block;touch-action:none;border-radius:12px;}
  .sig-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#aab;font-size:13px;pointer-events:none;}
  .sig-tools{display:flex;gap:8px;margin-top:8px;}
  .sig-tools button{flex:1;padding:9px;border-radius:9px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;}
  .sig-stamp{display:flex;align-items:center;gap:10px;background:#f7fafa;border:1px dashed var(--border);border-radius:10px;padding:8px 12px;margin-top:18px;}
  .sig-stamp img{height:34px;}
  .sig-stamp .txt{font-size:11.5px;color:#778;}
  .sig-missing{font-size:12.5px;color:var(--danger);margin-top:10px;}
</style>
</head>
<body>

<div id="langOverlay">
  <div class="lang-card">
    <h2>Primecare Chiropractic</h2>
    <p>Selecione seu idioma / Select your language / Seleccione su idioma</p>
    <button class="lang-btn" data-lang="en">🇺🇸 &nbsp; English</button>
    <button class="lang-btn" data-lang="pt">🇧🇷 &nbsp; Português</button>
    <button class="lang-btn" data-lang="es">🇪🇸 &nbsp; Español</button>
  </div>
</div>

<header class="top">
  <h1>Primecare Chiropractic</h1>
  <p id="hdrSub">New Patient / MVA Intake</p>
  <button class="langSwap" id="btnLangSwap">EN / PT / ES</button>
</header>

<div id="screenIntro">
  <div class="card">
    <h2 id="introTitle">Welcome</h2>
    <p id="introBody" style="font-size:14.5px;color:#556;line-height:1.5;"></p>
    <button id="btnStart">Start Intake</button>
  </div>
</div>

<div id="wizardWrap">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">Step 1 of 8</div>
  </div>

  <main>
    <form id="intakeForm" autocomplete="off">

    <!-- STEP 1 -->
    <div class="step active" data-step="1">
      <div class="card" id="step1card"></div>
    </div>

    <!-- STEP 2 -->
    <div class="step" data-step="2">
      <div class="card" id="step2card"></div>
    </div>

    <!-- STEP 3 -->
    <div class="step" data-step="3">
      <div class="card" id="step3card"></div>
    </div>

    <!-- STEP 4 -->
    <div class="step" data-step="4">
      <div class="card" id="step4card"></div>
    </div>

    <!-- STEP 5 -->
    <div class="step" data-step="5">
      <div class="card" id="step5card"></div>
    </div>

    <!-- STEP 6 -->
    <div class="step" data-step="6">
      <div class="card" id="step6card"></div>
      <div class="card" id="step6card2"></div>
    </div>

    <!-- STEP 7 -->
    <div class="step" data-step="7">
      <div class="card" id="step7card"></div>
    </div>

    <!-- STEP 8 -->
    <div class="step" data-step="8">
      <div class="card" id="step8card"></div>
      <div class="card" id="step8card2"></div>
    </div>

    </form>
  </main>
</div>

<div id="screenDone">
  <div class="done-wrap">
    <div class="icon">&#10003;</div>
    <h2 id="doneTitle">Thank You!</h2>
    <p id="doneBody" style="color:#556;"></p>
    <div class="status-line" id="sendStatus"></div>
    <div class="dl-links">
      <button id="dlIntake">Download Intake PDF</button>
      <button id="dlNote" class="secondary">Download Doctor's Note PDF</button>
    </div>
  </div>
</div>

<nav class="wizard-nav" id="wizardNav">
  <button type="button" id="btnBack">Back</button>
  <button type="button" id="btnNext">Next</button>
  <button type="button" id="btnSubmit" style="display:none;">Submit Intake</button>
</nav>
